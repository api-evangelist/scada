name: SCADA
description: SCADA (Supervisory Control and Data Acquisition) is an industrial control
  system architecture used to monitor and control industrial processes, infrastructure,
  and facility-based equipment. It is widely used in manufacturing, energy, water treatment,
  oil and gas, and other critical infrastructure sectors to collect real-time data and
  control remote equipment.
